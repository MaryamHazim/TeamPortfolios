  <main class="contact-page">
    <img src="../pictures/enrico-bet-IicyiaPYGGI-unsplash.jpg" alt=""/>
<div class="contact-inner">

    <h1 class="section-title">Want to Say Something ?<br><em> talk to us!</em></h1>

    <form class="contact-form" action="#" method="post">

      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Your full name" required />
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="example@gmail.com" required />
      </div>

      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" placeholder="We're ready when you are..." required></textarea>
      </div>

      <a href="mailto:U25105853@sharjah.ac.ae">
      <button type="submit" class="btn-submit">Send Message</button>
      </a>
    </form>

    </div>
